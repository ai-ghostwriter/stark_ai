name: contracts

on:
  push:
    paths:
      - "packages/contracts/**"
      - "packages/core/**"
      - "packages/ui/**"
      - "packages/voice/contracts_gen/**"
      - "packages/voice/tests/**"
      - "packages/voice/requirements.txt"
      - "tools/mcp-*/**"
      - ".github/workflows/contracts.yml"
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install TS dependencies
        run: npm ci
        working-directory: packages/contracts

      - name: TS contract tests
        run: npm test
        working-directory: packages/contracts

      - name: Regenerate JSON Schema and check sync
        run: |
          npm run gen
          git diff --exit-code dist-schema
        working-directory: packages/contracts

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies (contract subset only)
        run: pip install "pydantic>=2" pytest "datamodel-code-generator==0.26.5"

      - name: Regenerate Pydantic models and check sync
        run: |
          datamodel-codegen \
            --input packages/contracts/dist-schema/events.schema.json \
            --input-file-type jsonschema \
            --output packages/voice/contracts_gen/events.py \
            --output-model-type pydantic_v2.BaseModel \
            --target-python-version 3.12 \
            --disable-timestamp \
            --custom-file-header "# GENERATED from @stark-ai/contracts — DO NOT EDIT. Regenerate with 'make codegen'."
          datamodel-codegen \
            --input packages/contracts/dist-schema/persona.schema.json \
            --input-file-type jsonschema \
            --output packages/voice/contracts_gen/persona.py \
            --output-model-type pydantic_v2.BaseModel \
            --target-python-version 3.12 \
            --disable-timestamp \
            --custom-file-header "# GENERATED from @stark-ai/contracts — DO NOT EDIT. Regenerate with 'make codegen'."
          git diff --exit-code packages/voice/contracts_gen

      - name: Python contract tests
        run: pytest tests/test_contracts.py -v
        working-directory: packages/voice

  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install core dependencies
        run: npm ci
        working-directory: packages/core

      - name: Core tests
        run: npm test
        working-directory: packages/core

      - name: Core typecheck
        run: npm run typecheck
        working-directory: packages/core

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install UI dependencies
        run: npm ci
        working-directory: packages/ui

      - name: UI typecheck
        run: npm run typecheck
        working-directory: packages/ui

      - name: UI build
        run: npm run build
        working-directory: packages/ui

  voice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install voice dependencies
        run: pip install -r requirements.txt
        working-directory: packages/voice

      - name: Voice pytest
        run: |
          if [ -d tests ]; then
            pytest tests -v
          else
            echo "No pytest suite present; skipping."
          fi
        working-directory: packages/voice

  mcp-tools:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - tools/mcp-os
          - tools/mcp-files
          - tools/mcp-web
          - tools/mcp-dev
          - tools/mcp-productivity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MCP tool dependencies
        run: npm ci
        working-directory: ${{ matrix.package }}

      - name: MCP tool tests
        run: npm test
        working-directory: ${{ matrix.package }}
